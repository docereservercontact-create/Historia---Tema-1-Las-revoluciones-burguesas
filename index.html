<style>

<body>

    <div class="container">
        <div class="right" id="respuestas"></div>
    </div>
</div>

<div id="resultados"></div>

<script>
// 🔐 ALUMNOS (SIN CAMBIOS)
const alumnos = [
    {nombre:"mmariazas10@gmail.com", cuenta:"Reg2026"},
    {nombre:"danteramirezcabrera20@gmail.com", cuenta:"Reg2026"},
    {nombre:"josebeth2810@gmail.com", cuenta:"UNAM2026"},
    {nombre:"nahomiosorior@gmail.com", cuenta:"UNAM2026"},

    {nombre:"p10", cuenta:"1"},

    {nombre:"p7", cuenta:"1"},

// CONFIG
const TOTAL_PREGUNTAS = 20;

// 🧠 PREGUNTAS
const preguntas = [
    {enunciado:"¿Cuál fue el principal objetivo de la Ilustración?", opciones:["Defender el absolutismo","Promover la razón y el conocimiento científico","Fortalecer la religión","Eliminar la educación"]},

    {enunciado:"¿Qué idea defendía John Locke?", opciones:["El derecho divino de los reyes","El contrato social y derechos naturales","La monarquía absoluta","La censura"]},
    {enunciado:"¿Quién escribió 'El contrato social'?", opciones:["Voltaire","Montesquieu","Rousseau","Locke"]},
    {enunciado:"¿Qué defendía Voltaire?", opciones:["La intolerancia religiosa","La libertad de pensamiento y expresión","El absolutismo","La esclavitud"]},

    {enunciado:"¿Cuál era una característica de la burguesía?", opciones:["Vivían del campo","Dependían del rey","Tenían poder económico por comercio","Eran siervos"]},
    {enunciado:"¿Qué causó la Independencia de las Trece Colonias?", opciones:["Apoyo del rey","Altos impuestos sin representación","Deseo de expandirse","Problemas religiosos"]},

    {enunciado:"¿Qué documento proclamó la independencia de Estados Unidos?", opciones:["La Constitución","Declaración de Independencia","Tratado de París","Código Civil"]},
    {enunciado:"¿Cuál fue una causa de la Revolución Francesa?", opciones:["Exceso de democracia","Crisis económica y desigualdad social","Paz prolongada","Falta de comercio"]},
    {enunciado:"¿Qué grupo social lideró la Revolución Francesa?", opciones:["Clero","Nobleza","Tercer Estado","Rey"]},
    {enunciado:"¿Qué lema representó la Revolución Francesa?", opciones:["Orden y progreso","Libertad, igualdad y fraternidad","Paz y justicia","Trabajo y honor"]},
    {enunciado:"¿Quién fue Napoleón Bonaparte?", opciones:["Rey de Inglaterra","Líder militar francés","Filósofo ilustrado","Campesino"]},
    {enunciado:"¿Qué buscaban las independencias en Hispanoamérica?", opciones:["Fortalecer España","Lograr autonomía y libertad","Apoyar al rey","Eliminar comercio"]},
    {enunciado:"¿Cuál fue una causa de la independencia de Hispanoamérica?", opciones:["Abundancia económica","Influencias de la Ilustración","Apoyo total de España","Falta de líderes"]},
    {enunciado:"¿Qué caracterizó a la Revolución Industrial?", opciones:["Uso de máquinas y fábricas","Regreso al campo","Disminución de producción","Uso exclusivo de mano de obra artesanal"]},
    {enunciado:"¿Dónde inició la Revolución Industrial?", opciones:["Francia","Alemania","Inglaterra","España"]},
    {enunciado:"¿Qué propone el liberalismo económico?", opciones:["Control total del Estado","Libertad de mercado","Eliminación del comercio","Monopolios estatales"]},
    {enunciado:"¿Qué defiende el liberalismo político?", opciones:["Monarquía absoluta","Derechos individuales y participación ciudadana","Dictadura","Control militar"]}
];

// ✅ RESPUESTAS
const respuestasCorrectas = ["B","B","B","C","B","D","C","B","B","B","B","C","B","B","B","B","A","C","B","B"];
const TIEMPO_EXAMEN = 20 * 60; // 20 minutos
let tiempo = TIEMPO_EXAMEN;
let intervalo;
let nombreAlumno, cuentaAlumno;

let tiemposPreguntas = {};
let inicioPregunta = Date.now();

let progresoTexto = "0/0";

// INICIO
function iniciarExamen() {

    nombreAlumno = document.getElementById("nombre").value.trim();
    cuentaAlumno = document.getElementById("cuenta").value.trim();

    if(nombreAlumno === "admin" && cuentaAlumno === "123"){
        verPanelProfesor();
        return;
    }

    let alumnoValido = alumnos.find(a =>
        a.nombre.toLowerCase() === nombreAlumno.toLowerCase() &&
        a.cuenta === cuentaAlumno
    );

    if (!alumnoValido) return alert("Alumno no registrado");

    if (sessionStorage.getItem("examen_" + cuentaAlumno)) {
        alert("Ya realizaste este examen");
        return;
    }

    alert("Reglas:\n- No cambiar de pestaña\n- No copiar/pegar\n- Tiempo limitado");

    document.getElementById("inicio").style.display = "none";
    document.getElementById("examen").style.display = "block";

    generarPreguntas();
    iniciarTimer();
    activarSeguridad();
}

// GENERAR
function generarPreguntas() {
    let cont = document.getElementById("respuestas");
    cont.innerHTML = "";

    preguntas.forEach((p, i) => {
        cont.innerHTML += `
        <div style="margin-bottom:15px;">
            <label><b>${i+1}. ${p.enunciado}</b></label><br>

            ${p.opciones.map((op, idx) => `
                <label>
                    <input type="radio" name="p${i}" value="${String.fromCharCode(65+idx)}"
                    onchange="actualizarProgreso()">
                    ${String.fromCharCode(65+idx)}) ${op}
                </label><br>
            `).join("")}
        </div>`;
    });

    cont.innerHTML += `<button onclick="terminarExamen()">Enviar</button>`;
}

// TIMER
function iniciarTimer() {
    intervalo = setInterval(() => {

        tiempo--;

        let min = Math.floor(tiempo/60);
        let seg = tiempo%60;

        actualizarProgreso();

        document.getElementById("timer").innerText =
            `${min}:${seg.toString().padStart(2,'0')} | ${progresoTexto}`;

        if (tiempo<=0) terminarExamen();

    },1000);
}

// PROGRESO
function actualizarProgreso() {
    let c = 0;

    for (let i=0;i<TOTAL_PREGUNTAS;i++) {
        let seleccionado = document.querySelector(`input[name="p${i}"]:checked`);
        if (seleccionado) c++;
    }

    progresoTexto = `${c}/${TOTAL_PREGUNTAS}`;
}

// SEGURIDAD
function activarSeguridad() {
    document.addEventListener("contextmenu", e => e.preventDefault());

    document.addEventListener("keydown", e=>{
        if(e.ctrlKey && ['c','v','x'].includes(e.key)) e.preventDefault();
    });

    document.addEventListener("visibilitychange", ()=>{
        if(document.hidden){
            alert("Trampa detectada");
            terminarExamen(true);
        }
    });

    window.onbeforeunload = function(){
        return "No puedes salir del examen";
    };
}

// TERMINAR
function terminarExamen(trampa=false) {

    if (!trampa) {
        if (!confirm("¿Seguro que deseas enviar?")) return;
    }

    clearInterval(intervalo);
    
    document.getElementById("examen").style.display="none";
    document.getElementById("resultados").style.display="block";

    let correctas=0;
    let html=`<h2>Resultados</h2>
              <p>${nombreAlumno}</p>
              <p>${cuentaAlumno}</p>`;

    html += "<table border='1'><tr><th>#</th><th>Pregunta</th><th>Tu</th><th>Correcta</th></tr>";

    let datosPDF=[];

    for(let i=0;i<TOTAL_PREGUNTAS;i++){

        let seleccionado = document.querySelector(`input[name="p${i}"]:checked`);
        let resp = seleccionado ? seleccionado.value : "";
        let correcta=respuestasCorrectas[i];

        let clase="incorrecto";

        if(resp===correcta && !trampa){
            correctas++;
            clase="correcto";
        }

        html+=`<tr class="${clase}">
            <td>${i+1}</td>
            <td>${correcta}</td>
            <td>${resp}</td>
            <td>${correcta}</td>
        </tr>`;

        datosPDF.push([i+1,preguntas[i].enunciado,resp,correcta]);
    }

    html+="</table>";

    let cal= trampa?0:(correctas/TOTAL_PREGUNTAS)*100;

    html+=`
    <p><b>Porcentaje:</b> ${cal.toFixed(2)}%</p>
    <button onclick="generarPDF()">PDF</button>`;

    document.getElementById("resultados").innerHTML=html;

    window.datosPDF=datosPDF;
    window.calificacion=cal;

    sessionStorage.setItem("examen_"+cuentaAlumno, "hecho");
}

// PANEL PROFESOR
function verPanelProfesor(){
    document.body.innerHTML = "<h1>Panel Profesor</h1>";
}

// PDF
function generarPDF(){

    const {jsPDF}=window.jspdf;
    const doc=new jsPDF();

    doc.text("Resultados",10,10);
    doc.text(nombreAlumno,10,20);
    doc.text(cuentaAlumno,10,30);
    doc.text(calificacion.toFixed(2)+"%",10,40);

    let y=50;

    datosPDF.forEach(d=>{
        if (y > 280) {
            doc.addPage();
            y = 20;
        }
    doc.setFontSize(10);

    // Pregunta
    doc.text(`P${d[0]}: ${d[1]}`,10,y);
    y+=6;

    // Respuesta alumno
    doc.text(`Tu respuesta: ${d[2]}`,10,y);
    y+=6;

    // Correcta
    doc.text(`Correcta: ${d[3]}`,10,y);
    y+=10;
    
});

    doc.save("resultado.pdf");
}
</script>

</body>
</html>
